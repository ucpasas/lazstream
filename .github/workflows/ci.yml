name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimum permissions — read-only by default.
permissions:
  contents: read

jobs:
  build:
    name: Build, typecheck, audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout@v4 — pinned to commit SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        # pnpm/action-setup@v4 — pinned to commit SHA
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa

      - name: Setup Node
        # actions/setup-node@v4 — pinned to commit SHA
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        # Fails on high or critical severity vulnerabilities.
        run: pnpm audit --audit-level=high

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r check
